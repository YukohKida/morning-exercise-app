<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="朝の体操">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>朝の体操</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0f0f23;
  --bg-card: rgba(255, 255, 255, 0.06);
  --bg-card-hover: rgba(255, 255, 255, 0.1);
  --sunrise-1: #ff6b35;
  --sunrise-2: #f7931e;
  --sunrise-3: #ffb347;
  --sunrise-4: #ffd700;
  --text-primary: #f0e6d3;
  --text-secondary: rgba(240, 230, 211, 0.6);
  --text-accent: #ffb347;
  --done-color: #ff8c42;
  --done-glow: rgba(255, 140, 66, 0.3);
  --ring-bg: rgba(255, 255, 255, 0.08);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --cat-hiit: #ff6b6b;
  --cat-strength: #4ecdc4;
  --cat-liss: #69db7c;
  --cat-circuit: #da77f2;
  --cat-recovery: #748ffc;
  --cat-core: #ffa94d;
  --cat-wu: #e599f7;
  --cat-cd: #66d9e8;
  --cat-mobility: #a9e34b;
}

html, body {
  height: 100%; overflow: hidden;
  font-family: 'Zen Maru Gothic', 'M PLUS Rounded 1c', sans-serif;
  background: var(--bg-deep); color: var(--text-primary);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none; user-select: none;
}
body {
  display: flex; flex-direction: column; min-height: 100dvh;
  padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
}

.ambient { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.ambient::before {
  content: ''; position: absolute; width: 600px; height: 600px;
  bottom: -200px; left: 50%; transform: translateX(-50%);
  background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
}
.ambient::after {
  content: ''; position: absolute; width: 400px; height: 400px;
  top: -100px; right: -100px;
  background: radial-gradient(circle, rgba(255,179,71,0.08) 0%, transparent 70%);
}

.screen {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  z-index: 1; opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease, transform 0.5s ease; transform: translateY(20px);
  padding: calc(var(--safe-top) + 16px) 20px calc(var(--safe-bottom) + 24px);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }

.home-header { text-align: center; margin-top: 12px; margin-bottom: 8px; }
.home-header .app-label {
  font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-secondary); margin-bottom: 4px;
}
.home-header .greeting { font-size: 22px; font-weight: 700; }

.streak-card {
  background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,179,71,0.08));
  border: 1px solid rgba(255,179,71,0.15); border-radius: 20px;
  padding: 20px; text-align: center; margin: 10px 0;
  position: relative; overflow: hidden;
}
.streak-card::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 40%, rgba(255,215,0,0.05), transparent 50%);
}
.streak-number {
  font-size: 56px; font-weight: 900;
  background: linear-gradient(135deg, var(--sunrise-3), var(--sunrise-1));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.1; position: relative;
}
.streak-label { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
.today-badge {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 10px; padding: 5px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 700;
}
.today-badge.undone { background: rgba(255,179,71,0.15); color: var(--sunrise-3); }
.today-badge.done { background: rgba(76,175,80,0.15); color: #81c784; }

/* Today's Menu Card */
.menu-card {
  background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 18px; padding: 16px; margin: 6px 0;
  cursor: pointer; transition: background 0.2s;
}
.menu-card:active { background: var(--bg-card-hover); }
.menu-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.menu-card-title { font-size: 16px; font-weight: 700; }
.menu-card-tag {
  font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 8px;
  letter-spacing: 0.5px;
}
.menu-card-detail { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
.menu-card-blocks { display: flex; gap: 6px; flex-wrap: wrap; }
.menu-block-pill {
  font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px;
  background: rgba(255,255,255,0.06); color: var(--text-secondary); white-space: nowrap;
}
.menu-card-arrow { font-size: 13px; color: var(--text-secondary); text-align: right; margin-top: 8px; }

.tag-hiit { background: rgba(255,107,107,0.2); color: var(--cat-hiit); }
.tag-strength { background: rgba(78,205,196,0.2); color: var(--cat-strength); }
.tag-liss { background: rgba(105,219,124,0.2); color: var(--cat-liss); }
.tag-circuit { background: rgba(218,119,242,0.2); color: var(--cat-circuit); }
.tag-recovery { background: rgba(116,143,252,0.2); color: var(--cat-recovery); }

/* Calendar */
.calendar-section { margin: 6px 0 12px; }
.calendar-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px; padding: 0 4px;
}
.calendar-month { font-size: 16px; font-weight: 700; }
.calendar-nav { display: flex; gap: 8px; }
.calendar-nav button {
  background: var(--bg-card); border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-primary); width: 32px; height: 32px; border-radius: 10px;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.calendar-nav button:active { background: var(--bg-card-hover); }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-day-label { font-size: 11px; color: var(--text-secondary); text-align: center; padding: 4px 0; }
.cal-cell {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 10px; font-size: 13px; color: var(--text-secondary); position: relative;
}
.cal-cell.today { border: 1.5px solid rgba(255,179,71,0.4); }
.cal-cell.done {
  background: linear-gradient(135deg, rgba(255,140,66,0.25), rgba(255,107,53,0.15));
  color: var(--sunrise-3); font-weight: 700;
}
.cal-cell.done::after {
  content: ''; position: absolute; inset: 2px; border-radius: 8px;
  box-shadow: inset 0 0 8px var(--done-glow); pointer-events: none;
}
.cal-cell.empty { visibility: hidden; }

/* Start Button */
.start-area { margin-top: auto; padding: 6px 0 6px; }
.start-btn {
  width: 100%; padding: 16px; border: none; border-radius: 18px;
  font-family: inherit; font-size: 18px; font-weight: 900; cursor: pointer;
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, var(--sunrise-1), var(--sunrise-2));
  color: #fff; box-shadow: 0 8px 30px rgba(255,107,53,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
}
.start-btn:active { transform: scale(0.97); box-shadow: 0 4px 15px rgba(255,107,53,0.3); }
.start-btn.completed {
  background: linear-gradient(135deg, #4a5568, #2d3748);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2); pointer-events: none;
}
.start-btn::after {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent 50%);
}

/* Exercise Screen */
.exercise-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
}
.exercise-title { font-size: 18px; font-weight: 700; color: var(--text-secondary); letter-spacing: 2px; }
.timer-ring-wrap { position: relative; width: 260px; height: 260px; }
.timer-ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-bg { stroke: var(--ring-bg); }
.ring-fg {
  stroke: var(--sunrise-2); transition: stroke-dashoffset 0.3s ease;
  filter: drop-shadow(0 0 8px rgba(255,140,66,0.4));
}
.timer-display {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.timer-time {
  font-size: 56px; font-weight: 900; font-variant-numeric: tabular-nums;
  background: linear-gradient(135deg, var(--sunrise-3), #fff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.timer-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.exercise-controls { display: flex; gap: 16px; margin-top: 8px; }
.ex-btn {
  padding: 14px 32px; border: none; border-radius: 14px;
  font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: transform 0.1s;
}
.ex-btn:active { transform: scale(0.95); }
.ex-btn.primary { background: linear-gradient(135deg, var(--sunrise-1), var(--sunrise-2)); color: #fff; }
.ex-btn.secondary { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); }

/* Complete Screen */
.complete-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; gap: 16px;
}
.complete-icon { font-size: 72px; animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
.complete-title {
  font-size: 28px; font-weight: 900;
  background: linear-gradient(135deg, var(--sunrise-3), var(--sunrise-1));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: popIn 0.6s 0.15s cubic-bezier(0.34,1.56,0.64,1) both;
}
.complete-msg { font-size: 16px; color: var(--text-secondary); line-height: 1.7; max-width: 300px; animation: popIn 0.5s 0.3s ease both; }
.milestone-badge {
  display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px;
  border-radius: 16px; background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,107,53,0.15));
  border: 1px solid rgba(255,215,0,0.3); font-size: 15px; font-weight: 700;
  color: var(--sunrise-4); animation: popIn 0.5s 0.4s ease both;
}
.complete-streak { font-size: 48px; font-weight: 900; color: var(--sunrise-3); animation: popIn 0.6s 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
.complete-streak-label { font-size: 14px; color: var(--text-secondary); margin-top: -8px; animation: popIn 0.5s 0.45s ease both; }
.complete-btn {
  margin-top: 16px; padding: 16px 48px; border: none; border-radius: 16px;
  background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-primary); font-family: inherit; font-size: 16px; font-weight: 700;
  cursor: pointer; animation: popIn 0.5s 0.55s ease both;
}
.complete-btn:active { transform: scale(0.95); }

.confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 100; overflow: hidden; }
.confetti-piece { position: absolute; width: 10px; height: 10px; top: -20px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

/* Workout Detail Screen */
.detail-screen { padding-top: calc(var(--safe-top) + 12px) !important; }
.detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; color: var(--sunrise-3);
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; padding: 8px 0; margin-bottom: 8px;
}
.detail-back:active { opacity: 0.7; }
.detail-day-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
.detail-day-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }

.detail-block {
  background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px; margin-bottom: 12px; overflow: hidden;
}
.detail-block-header {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer;
}
.detail-block-header:active { background: var(--bg-card-hover); }
.detail-block-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.detail-block-name { font-size: 14px; font-weight: 700; flex: 1; }
.detail-block-time { font-size: 12px; color: var(--text-secondary); }
.detail-block-chevron { font-size: 12px; color: var(--text-secondary); transition: transform 0.25s; }
.detail-block.open .detail-block-chevron { transform: rotate(90deg); }
.detail-block-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
.detail-block.open .detail-block-body { max-height: 1200px; }
.detail-exercise { padding: 10px 16px 10px 34px; border-top: 1px solid rgba(255,255,255,0.04); }
.detail-exercise-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.detail-exercise-meta { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.detail-exercise-note { font-size: 11px; color: var(--sunrise-3); margin-top: 3px; font-style: italic; }

.week-nav {
  display: flex; gap: 4px; margin-bottom: 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding-bottom: 2px;
}
.week-nav::-webkit-scrollbar { display: none; }
.week-nav-btn {
  flex-shrink: 0; padding: 8px 14px; border-radius: 10px; border: none;
  font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  background: var(--bg-card); color: var(--text-secondary);
  transition: all 0.2s; border: 1px solid transparent;
}
.week-nav-btn.active { background: rgba(255,179,71,0.15); color: var(--sunrise-3); border-color: rgba(255,179,71,0.3); }
.week-nav-btn:active { transform: scale(0.95); }

/* Settings */
.settings-toggle {
  position: fixed; top: calc(var(--safe-top) + 12px); right: 16px; z-index: 50;
  width: 36px; height: 36px; border-radius: 12px;
  background: var(--bg-card); border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.settings-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.settings-overlay.open { opacity: 1; pointer-events: auto; }
.settings-panel {
  background: #1e1e36; border-radius: 24px 24px 0 0;
  padding: 24px 24px calc(var(--safe-bottom) + 24px);
  width: 100%; max-width: 480px; max-height: 70vh; overflow-y: auto;
  transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
}
.settings-overlay.open .settings-panel { transform: translateY(0); }
.settings-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; text-align: center; }
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.setting-label { font-size: 15px; }
.setting-value { display: flex; align-items: center; gap: 8px; }
.setting-value input[type="number"] {
  width: 60px; padding: 6px 10px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
  color: var(--text-primary); font-family: inherit; font-size: 15px; text-align: center;
}
.setting-value span { color: var(--text-secondary); font-size: 14px; }
.danger-btn {
  margin-top: 20px; width: 100%; padding: 14px; border-radius: 14px;
  border: 1px solid rgba(255,80,80,0.3); background: rgba(255,80,80,0.1);
  color: #ff6b6b; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
}
.settings-close {
  margin-top: 12px; width: 100%; padding: 14px; border-radius: 14px; border: none;
  background: var(--bg-card); color: var(--text-primary);
  font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
}

.install-banner {
  position: fixed; bottom: calc(var(--safe-bottom) + 16px); left: 16px; right: 16px; z-index: 90;
  background: linear-gradient(135deg, rgba(255,107,53,0.9), rgba(247,147,30,0.9));
  backdrop-filter: blur(10px); border-radius: 16px; padding: 14px 18px;
  display: none; align-items: center; gap: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.install-banner.show { display: flex; }
.install-banner-text { flex: 1; font-size: 14px; font-weight: 700; color: #fff; }
.install-banner button {
  padding: 8px 16px; border-radius: 10px; border: none; background: #fff;
  color: var(--sunrise-1); font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}
.install-banner .dismiss { background: rgba(255,255,255,0.2); color: #fff; }

@media (min-width: 500px) { .screen { max-width: 420px; margin: 0 auto; } }
</style>
</head>
<body>
<div class="ambient"></div>
<button class="settings-toggle" onclick="toggleSettings()" aria-label="設定">⚙</button>

<!-- HOME SCREEN -->
<div class="screen active" id="screen-home">
  <div class="home-header">
    <div class="app-label">朝の体操</div>
    <div class="greeting" id="greeting">おはようございます</div>
  </div>
  <div class="streak-card">
    <div class="streak-number" id="streak-number">0</div>
    <div class="streak-label">日継続中</div>
    <div id="today-badge"></div>
  </div>
  <div class="menu-card" id="menu-card" onclick="openWorkoutDetail()">
    <div class="menu-card-header">
      <div class="menu-card-title" id="menu-card-title"></div>
      <div class="menu-card-tag" id="menu-card-tag"></div>
    </div>
    <div class="menu-card-detail" id="menu-card-detail"></div>
    <div class="menu-card-blocks" id="menu-card-blocks"></div>
    <div class="menu-card-arrow">詳細を見る →</div>
  </div>
  <div class="calendar-section">
    <div class="calendar-header">
      <div class="calendar-nav"><button onclick="changeMonth(-1)">‹</button></div>
      <div class="calendar-month" id="calendar-month"></div>
      <div class="calendar-nav"><button onclick="changeMonth(1)">›</button></div>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>
  <div class="start-area">
    <button class="start-btn" id="start-btn" onclick="startExercise()">ラジオ体操をはじめる</button>
  </div>
</div>

<!-- WORKOUT DETAIL SCREEN -->
<div class="screen detail-screen" id="screen-detail">
  <button class="detail-back" onclick="goHome()">‹ ホームに戻る</button>
  <div class="week-nav" id="week-nav"></div>
  <div class="detail-day-title" id="detail-day-title"></div>
  <div class="detail-day-sub" id="detail-day-sub"></div>
  <div id="detail-blocks"></div>
</div>

<!-- EXERCISE SCREEN -->
<div class="screen exercise-screen" id="screen-exercise">
  <div class="exercise-title">ラジオ体操</div>
  <div class="timer-ring-wrap">
    <svg viewBox="0 0 260 260">
      <defs>
        <linearGradient id="sunriseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffb347"/><stop offset="100%" stop-color="#ff6b35"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg" cx="130" cy="130" r="115" fill="none" stroke-width="10"/>
      <circle class="ring-fg" id="ring-fg" cx="130" cy="130" r="115" fill="none" stroke-width="10"
        stroke-linecap="round" stroke-dasharray="722.57" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-display">
      <div class="timer-time" id="timer-time">3:00</div>
      <div class="timer-sub" id="timer-sub">タップして開始</div>
    </div>
  </div>
  <div class="exercise-controls">
    <button class="ex-btn secondary" onclick="cancelExercise()">やめる</button>
    <button class="ex-btn primary" id="play-pause-btn" onclick="toggleTimer()">スタート</button>
  </div>
</div>

<!-- COMPLETE SCREEN -->
<div class="screen complete-screen" id="screen-complete">
  <div class="complete-icon" id="complete-icon">🌅</div>
  <div class="complete-title" id="complete-title">おつかれさまです！</div>
  <div class="complete-streak" id="complete-streak">0</div>
  <div class="complete-streak-label">日継続</div>
  <div id="milestone-area"></div>
  <div class="complete-msg" id="complete-msg"></div>
  <button class="complete-btn" onclick="goHome()">ホームに戻る</button>
</div>

<!-- Settings overlay -->
<div class="settings-overlay" id="settings-overlay" onclick="closeSettingsOutside(event)">
  <div class="settings-panel">
    <div class="settings-title">設定</div>
    <div class="setting-row">
      <div class="setting-label">タイマー時間</div>
      <div class="setting-value">
        <input type="number" id="setting-duration" min="1" max="30" value="3" onchange="saveDuration(this.value)">

const DAY_LABELS = ['日','月','火','水','木','金','土'];
const DAY_LABELS_FULL = ['日曜','月曜','火曜','水曜','木曜','金曜','土曜'];

// ════════════════════════════════════════════════════
// APP STATE
// ════════════════════════════════════════════════════

const STORAGE_KEY = 'morningExercise';
const CIRCUMFERENCE = 2 * Math.PI * 115;
let state = loadState();
let calendarDate = new Date();
let timerInterval = null, timerRunning = false, timerRemaining = 0, totalDuration = 0;
let audioElement = null;
let currentDetailDay = new Date().getDay();

function defaultState() { return { streak:0, lastDoneDate:null, doneDates:[], durationMinutes:3, audioDataUrl:null }; }
function loadState() {
  try { const r=localStorage.getItem(STORAGE_KEY); if(r) return {...defaultState(),...JSON.parse(r)}; } catch(e){}
  return defaultState();
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function todayStr() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isTodayDone() { return state.doneDates.includes(todayStr()); }
function recalcStreak() {
  const sorted=[...state.doneDates].sort().reverse();
  if(!sorted.length){state.streak=0;return;}
  let streak=0, cd=new Date();
  if(!sorted.includes(todayStr())) cd.setDate(cd.getDate()-1);
  for(let i=0;i<1000;i++){
    const ds=`${cd.getFullYear()}-${String(cd.getMonth()+1).padStart(2,'0')}-${String(cd.getDate()).padStart(2,'0')}`;
    if(sorted.includes(ds)){streak++;cd.setDate(cd.getDate()-1);}else break;
  }
  state.streak=streak;
}

function updateGreeting() {
  const h=new Date().getHours(), el=document.getElementById('greeting');
  if(h<5)el.textContent='まだ夜ですね';
  else if(h<10)el.textContent='おはようございます';
  else if(h<17)el.textContent='こんにちは';
  else el.textContent='こんばんは';
}

// ════════════════════════════════════════════════════
// RENDER HOME
// ════════════════════════════════════════════════════

function renderHome() {
  recalcStreak(); saveState(); updateGreeting();
  document.getElementById('streak-number').textContent = state.streak;
  const badge = document.getElementById('today-badge');
  if (isTodayDone()) {
    badge.innerHTML = '<span class="today-badge done">✓ 今日は完了</span>';
    document.getElementById('start-btn').textContent = '今日はもう完了！';
    document.getElementById('start-btn').classList.add('completed');
  } else {
    badge.innerHTML = '<span class="today-badge undone">○ まだやってない</span>';
    document.getElementById('start-btn').textContent = 'ラジオ体操をはじめる';
    document.getElementById('start-btn').classList.remove('completed');
  }
  renderMenuCard(); renderCalendar();
}

function renderMenuCard() {
  const dow = new Date().getDay(), plan = WEEKLY_PLAN[dow];
  document.getElementById('menu-card-title').textContent = `${DAY_LABELS[dow]}曜日：${plan.title}`;
  const tag = document.getElementById('menu-card-tag');
  tag.textContent = plan.tag; tag.className = 'menu-card-tag ' + plan.tagClass;
  document.getElementById('menu-card-detail').textContent = `${plan.rpe}｜${plan.totalTime}`;
  const blocksEl = document.getElementById('menu-card-blocks'); blocksEl.innerHTML = '';
  plan.blocks.forEach(b => {
    const pill = document.createElement('span');
    pill.className = 'menu-block-pill'; pill.textContent = b.name;
    blocksEl.appendChild(pill);
  });
}

// ════════════════════════════════════════════════════
// WORKOUT DETAIL SCREEN
// ════════════════════════════════════════════════════

function openWorkoutDetail(dayOverride) {
  const dow = dayOverride !== undefined ? dayOverride : new Date().getDay();
  currentDetailDay = dow;
  renderWeekNav(); renderDetailDay(dow); showScreen('screen-detail');
}

function renderWeekNav() {
  const nav = document.getElementById('week-nav'); nav.innerHTML = '';
  [1,2,3,4,5,6,0].forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'week-nav-btn' + (d===currentDetailDay?' active':'');
    btn.textContent = DAY_LABELS[d];
    btn.onclick = () => { currentDetailDay=d; renderWeekNav(); renderDetailDay(d); };
    nav.appendChild(btn);
  });
}

function renderDetailDay(dow) {
  const plan = WEEKLY_PLAN[dow];
  document.getElementById('detail-day-title').textContent = plan.title;
  document.getElementById('detail-day-sub').textContent = `${DAY_LABELS_FULL[dow]}｜${plan.rpe}｜合計 ${plan.totalTime}`;
  const container = document.getElementById('detail-blocks'); container.innerHTML = '';

  plan.blocks.forEach((block, idx) => {
    const blockEl = document.createElement('div');
    blockEl.className = 'detail-block';

    const header = document.createElement('div');
    header.className = 'detail-block-header';
    header.onclick = () => blockEl.classList.toggle('open');

    const dot = document.createElement('div');
    dot.className = 'detail-block-dot'; dot.style.background = block.color;
    const nameEl = document.createElement('div');
    nameEl.className = 'detail-block-name'; nameEl.textContent = block.name;
    const timeEl = document.createElement('div');
    timeEl.className = 'detail-block-time'; timeEl.textContent = block.time;
    const chevron = document.createElement('div');
    chevron.className = 'detail-block-chevron'; chevron.textContent = '›';
    header.append(dot, nameEl, timeEl, chevron);

    const body = document.createElement('div');
    body.className = 'detail-block-body';
    if (block.format) {
      const fmt = document.createElement('div'); fmt.className = 'detail-exercise';
      fmt.innerHTML = `<div class="detail-exercise-meta" style="font-style:italic;">${block.format}</div>`;
      body.appendChild(fmt);
    }
    block.exercises.forEach(ex => {
      const exEl = document.createElement('div'); exEl.className = 'detail-exercise';
      let html = `<div class="detail-exercise-name">${ex.name}</div>`;
      html += `<div class="detail-exercise-meta">${ex.spec}</div>`;
      if (ex.note) html += `<div class="detail-exercise-note">${ex.note}</div>`;
      exEl.innerHTML = html; body.appendChild(exEl);
    });

    blockEl.append(header, body); container.appendChild(blockEl);
  });
  // Auto-open main block (2nd block, skip WU)
  const blocks = container.querySelectorAll('.detail-block');
  if (blocks.length > 1) blocks[1].classList.add('open');
}

// ════════════════════════════════════════════════════
// CALENDAR
// ════════════════════════════════════════════════════

function renderCalendar() {
  const year=calendarDate.getFullYear(), month=calendarDate.getMonth();
  document.getElementById('calendar-month').textContent=`${year}年${month+1}月`;
  const grid=document.getElementById('calendar-grid'); grid.innerHTML='';
  ['日','月','火','水','木','金','土'].forEach(d=>{const el=document.createElement('div');el.className='cal-day-label';el.textContent=d;grid.appendChild(el);});
  const firstDay=new Date(year,month,1).getDay(), daysInMonth=new Date(year,month+1,0).getDate(), today=todayStr();
  for(let i=0;i<firstDay;i++){const el=document.createElement('div');el.className='cal-cell empty';grid.appendChild(el);}
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el=document.createElement('div'); let cls='cal-cell';
    if(ds===today)cls+=' today'; if(state.doneDates.includes(ds))cls+=' done';
    el.className=cls; el.textContent=d; grid.appendChild(el);
  }
}
function changeMonth(delta){calendarDate.setMonth(calendarDate.getMonth()+delta);renderCalendar();}

// ════════════════════════════════════════════════════
// SCREENS / EXERCISE / COMPLETION
// ════════════════════════════════════════════════════

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){showScreen('screen-home');renderHome();}

function startExercise(){
  if(isTodayDone())return;
  totalDuration=state.durationMinutes*60; timerRemaining=totalDuration;
  timerRunning=false; updateTimerDisplay(); resetRing();
  document.getElementById('play-pause-btn').textContent='スタート';
  document.getElementById('timer-sub').textContent='タップして開始';
  showScreen('screen-exercise');
}
function toggleTimer(){timerRunning?pauseTimer():startTimer();}
function startTimer(){
  timerRunning=true;
  document.getElementById('play-pause-btn').textContent='一時停止';
  document.getElementById('timer-sub').textContent='がんばれ！';
  playAudio();
  timerInterval=setInterval(()=>{
    timerRemaining--; updateTimerDisplay(); updateRing();
    if(timerRemaining<=0){clearInterval(timerInterval);timerRunning=false;stopAudio();completeExercise();}
  },1000);
}
function pauseTimer(){
  timerRunning=false;clearInterval(timerInterval);
  document.getElementById('play-pause-btn').textContent='再開';
  document.getElementById('timer-sub').textContent='一時停止中'; pauseAudio();
}
function cancelExercise(){clearInterval(timerInterval);timerRunning=false;stopAudio();showScreen('screen-home');}
function updateTimerDisplay(){
  const min=Math.floor(timerRemaining/60),sec=timerRemaining%60;
  document.getElementById('timer-time').textContent=`${min}:${String(sec).padStart(2,'0')}`;
}
function updateRing(){document.getElementById('ring-fg').style.strokeDashoffset=CIRCUMFERENCE*(1-(1-timerRemaining/totalDuration));}
function resetRing(){document.getElementById('ring-fg').style.strokeDashoffset=CIRCUMFERENCE;}

function playAudio(){if(state.audioDataUrl){if(!audioElement)audioElement=new Audio(state.audioDataUrl);audioElement.currentTime=0;audioElement.play().catch(()=>{});}}
function pauseAudio(){if(audioElement)audioElement.pause();}
function stopAudio(){if(audioElement){audioElement.pause();audioElement.currentTime=0;}}
function loadAudioFile(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{state.audioDataUrl=e.target.result;saveState();audioElement=new Audio(state.audioDataUrl);document.getElementById('audio-status').textContent=`音声: ${file.name}`;};
  reader.readAsDataURL(file);
}

function completeExercise(){
  const today=todayStr();
  if(!state.doneDates.includes(today))state.doneDates.push(today);
  recalcStreak();saveState();
  const streak=state.streak;
  document.getElementById('complete-streak').textContent=streak;
  const{title,msg,icon,milestone}=getCompletionContent(streak);
  document.getElementById('complete-icon').textContent=icon;
  document.getElementById('complete-title').textContent=title;
  document.getElementById('complete-msg').textContent=msg;
  const ma=document.getElementById('milestone-area');
  if(milestone){ma.innerHTML=`<div class="milestone-badge">${milestone}</div>`;setTimeout(()=>launchConfetti(),400);}
  else ma.innerHTML='';
  showScreen('screen-complete');
}

function getCompletionContent(streak){
  const m={
    1:{title:'はじめの一歩！',msg:'最初の一歩を踏み出しました。\n明日もここで会いましょう。',icon:'🌱',milestone:'🎉 初日達成！'},
    3:{title:'3日続いた！',msg:'三日坊主なんかじゃない。\nもう立派な継続です。',icon:'🌿',milestone:'🔥 3日連続'},
    7:{title:'1週間達成！',msg:'すごい！丸一週間、\n毎朝体を動かしました。',icon:'🌟',milestone:'⭐ 1週間達成！'},
    14:{title:'2週間達成！',msg:'2週間の継続は\n本物の習慣の証です。',icon:'💪',milestone:'🏅 2週間達成！'},
    30:{title:'1ヶ月達成！',msg:'30日間の積み重ね。\nあなたは確実に変わっています。',icon:'🏆',milestone:'👑 1ヶ月達成！'},
    50:{title:'50日達成！',msg:'半世紀分の朝を\n運動で始めました。',icon:'🎊',milestone:'💎 50日達成！'},
    100:{title:'100日達成！！',msg:'100日の積み重ね。\nこれはもう才能です。',icon:'🎆',milestone:'🌈 100日達成！！'},
  };
  if(m[streak])return m[streak];
  const msgs=[
    {title:'おつかれさまです！',msg:'今日も朝の一歩、\nしっかり踏み出しました。',icon:'🌅'},
    {title:'ナイス！',msg:'積み重ねが力になる。\n今日もえらい！',icon:'☀️'},
    {title:'いい朝ですね！',msg:'体を動かした朝は\n気持ちいいですね。',icon:'🌤'},
    {title:'すばらしい！',msg:'毎朝の小さな習慣が\n大きな変化を作ります。',icon:'✨'},
    {title:'えらい！',msg:'今日の自分、\nちゃんと褒めてあげてください。',icon:'🎯'},
  ];
  return{...msgs[streak%msgs.length],milestone:null};
}

function launchConfetti(){
  const c=document.getElementById('confetti');c.innerHTML='';
  const cols=['#ff6b35','#f7931e','#ffb347','#ffd700','#ff8c42','#fff'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'%';p.style.backgroundColor=cols[Math.floor(Math.random()*cols.length)];
    p.style.width=(4+Math.random()*8)+'px';p.style.height=(4+Math.random()*8)+'px';
    p.style.borderRadius=Math.random()>0.5?'50%':'2px';
    p.style.animationDuration=(2+Math.random()*2)+'s';p.style.animationDelay=(Math.random()*0.8)+'s';
    c.appendChild(p);
  }
  setTimeout(()=>c.innerHTML='',5000);
}

function toggleSettings(){
  const o=document.getElementById('settings-overlay');o.classList.toggle('open');
  if(o.classList.contains('open')){
    document.getElementById('setting-duration').value=state.durationMinutes;
    if(state.audioDataUrl)document.getElementById('audio-status').textContent='音声: 設定済み';
  }
}
function closeSettingsOutside(e){if(e.target===document.getElementById('settings-overlay'))toggleSettings();}
function saveDuration(val){const v=parseInt(val);if(v>0&&v<=30){state.durationMinutes=v;saveState();}}
function confirmReset(){
  if(confirm('本当にすべてのデータをリセットしますか？\nストリークや達成記録がすべて消えます。')){
    state=defaultState();saveState();audioElement=null;toggleSettings();renderHome();
  }
}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').classList.add('show');});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').classList.remove('show');});}}
function dismissInstall(){document.getElementById('install-banner').classList.remove('show');}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

renderHome();
</script>
